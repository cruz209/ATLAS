version: '3.8'

services:
  # ATLAS Proxy - The runtime governance layer
  atlas-proxy:
    build:
      context: .
      dockerfile: Dockerfile.atlas
    container_name: atlas-proxy
    ports:
      - "9000:9000"
    environment:
      - ATLAS_HOST=0.0.0.0
      - ATLAS_PORT=9000
      - TOOL_BACKEND_URL=http://tool-backend:9001
      - ATLAS_HMAC_SECRET=${ATLAS_HMAC_SECRET:-change-me-in-production}
      - ATLAS_SERVICE_NAME=ATLAS Production Proxy
    volumes:
      - ./demo_world.db:/app/demo_world.db
      - ./atlas_core:/app/atlas_core
      - ./services:/app/services
    networks:
      - atlas-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Tool Backend - Real tool implementations
  tool-backend:
    build:
      context: .
      dockerfile: Dockerfile.tools
    container_name: atlas-tools
    ports:
      - "9001:9001"
    environment:
      - HOST=0.0.0.0
      - PORT=9001
    volumes:
      - ./demo_world.db:/app/demo_world.db
      - ./services:/app/services
    networks:
      - atlas-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9001/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  # Optional: Redis for distributed approval queue
  # redis:
  #   image: redis:7-alpine
  #   container_name: atlas-redis
  #   ports:
  #     - "6379:6379"
  #   networks:
  #     - atlas-network
  #   restart: unless-stopped

networks:
  atlas-network:
    driver: bridge

volumes:
  atlas-db:
